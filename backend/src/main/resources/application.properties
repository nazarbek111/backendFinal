# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/literacy_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA ? validate only (Flyway manages schema)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.flyway.clean-disabled=false
spring.flyway.schemas=public

# JWT ? use env variables in production!
app.jwt.secret=${JWT_SECRET:mySecretKey123456789012345678901234567890AB}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# CORS ? set your frontend URL in production
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

